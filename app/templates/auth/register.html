<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — TikTok Creator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { background: #0d0d0d; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; }
    .brand { font-size: 1.8rem; font-weight: 800; color: #fe2c55; text-align: center; margin-bottom: .5rem; }
    .brand-sub { color: #888; text-align: center; margin-bottom: 2rem; font-size: .9rem; }
    .form-control { background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; }
    .form-control:focus { background: #111; border-color: #fe2c55; color: #fff; box-shadow: 0 0 0 2px rgba(254,44,85,.2); }
    .btn-tiktok { background: #fe2c55; border: none; color: #fff; width: 100%; padding: .75rem; border-radius: 8px; font-weight: 600; }
    .btn-tiktok:hover { background: #d4243f; color: #fff; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="brand"><i class="bi bi-play-circle-fill"></i> TikTok Creator</div>
    <div class="brand-sub">Create your account</div>

    {% if error %}
    <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/register">
      <div class="mb-3">
        <label class="form-label text-muted small">Username</label>
        <input type="text" name="username" class="form-control" placeholder="yourcreatorname" required minlength="3" />
      </div>
      <div class="mb-3">
        <label class="form-label text-muted small">Email</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required />
      </div>
      <div class="mb-4">
        <label class="form-label text-muted small">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-tiktok">Create Account</button>
    </form>

    <p class="text-center text-muted mt-3 mb-0" style="font-size:.9rem">
      Already have an account? <a href="/auth/login" class="text-danger">Sign in</a>
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
